name: Build and Release Latest llama.cpp CUDA (Linux)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Resolve latest llama.cpp tag
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          latest_tag=$(git ls-remote --tags --refs https://github.com/ggml-org/llama.cpp.git \
            | awk -F'/' '{print $3}' \
            | sort -V \
            | tail -n1)

          if [[ -z "${latest_tag}" ]]; then
            echo "Failed to resolve latest llama.cpp tag" >&2
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "LATEST_TAG=${latest_tag}" >> "$GITHUB_ENV"

      - name: Clone latest llama.cpp source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$LATEST_TAG" https://github.com/ggml-org/llama.cpp.git llama.cpp

      - name: Build CUDA binaries (Linux)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S llama.cpp -B llama.cpp/build \
            -DGGML_CUDA=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build llama.cpp/build --config Release -j"$(nproc)"

      - name: Verify llama.cpp version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_line=""
          if [[ -x "llama.cpp/build/bin/llama-cli" ]]; then
            version_line=$(llama.cpp/build/bin/llama-cli --version 2>/dev/null | head -n1 || true)
          elif [[ -x "llama.cpp/build/bin/main" ]]; then
            version_line=$(llama.cpp/build/bin/main --version 2>/dev/null | head -n1 || true)
          fi

          if [[ -z "${version_line}" ]]; then
            version_line=$(grep -E '^(project\(|set\(LLAMA_VERSION)' -n llama.cpp/CMakeLists.txt | head -n1 || true)
          fi

          if [[ -z "${version_line}" ]]; then
            echo "Unable to determine built version" >&2
            exit 1
          fi

          echo "Detected version info: ${version_line}"
          echo "version_line=${version_line}" >> "$GITHUB_OUTPUT"

      - name: Package build artifacts
        shell: bash
        run: |
          set -euo pipefail
          tar -C llama.cpp/build -czf llama-cuda-linux-${LATEST_TAG}.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda-linux-${{ steps.latest.outputs.latest_tag }}
          path: llama-cuda-linux-${{ steps.latest.outputs.latest_tag }}.tar.gz

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llama-cuda-${{ steps.latest.outputs.latest_tag }}
          name: llama.cpp CUDA Linux ${{ steps.latest.outputs.latest_tag }}
          body: |
            Automated CUDA Linux build for latest llama.cpp tag.

            - Upstream tag: `${{ steps.latest.outputs.latest_tag }}`
            - Version check: `${{ steps.version.outputs.version_line }}`
          files: |
            llama-cuda-linux-${{ steps.latest.outputs.latest_tag }}.tar.gz
